<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content>
  <ng-container *ngTemplateOutlet="data.contentTemplate"></ng-container>
</mat-dialog-content>

<mat-dialog-actions align="end" class="actions-container">
  <button mat-button (click)="close()">Cerrar</button>
  <button *ngIf="data.showConfirmButton" (click)="confirm()">
    {{ data.confirmButtonText || 'Confirmar' }}
  </button>
</mat-dialog-actions>
