<div class="revision-forms-list-container">
  <button mat-raised-button color="primary" (click)="navigateToNewRevisionForm()">
    Crear nuevo formulario de revisión
  </button>
</div>

<div *ngIf="isLoading" class="loading-container">
  <mat-spinner></mat-spinner>
  <p>Cargando formularios...</p>
</div>

<div *ngIf="!isLoading" class="forms-table-container">
  <table mat-table [dataSource]="forms" class="mat-elevation-z8">
    <!-- ID Column -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let form">{{ form.id }}</td>
    </ng-container>

    <!-- Creation Date Column -->
    <ng-container matColumnDef="creationDate">
      <th mat-header-cell *matHeaderCellDef>Fecha de Creación</th>
      <td mat-cell *matCellDef="let form">{{ form.creationDate | date }}</td>
    </ng-container>

    <!-- Conferences Used Column -->
    <ng-container matColumnDef="conferenceUsed">
      <th mat-header-cell *matHeaderCellDef>Conferencias Usadas</th>
      <td mat-cell *matCellDef="let form">
        <mat-form-field appearance="fill">
          <mat-select [placeholder]="form.conferenceUsed.length > 0 ? 'Ver ponencias' : 'No ha sido usado aún'">
            <mat-option *ngFor="let conference of form.conferenceUsed" [value]="conference">
              {{ conference }}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </td>
    </ng-container>

    <!-- Question Count Column -->
    <ng-container matColumnDef="questionCount">
      <th mat-header-cell *matHeaderCellDef>Cantidad de Preguntas</th>
      <td mat-cell *matCellDef="let form">{{ form.questionCount }}</td>
    </ng-container>

    <!-- View Form Column -->
    <ng-container matColumnDef="viewForm">
      <th mat-header-cell *matHeaderCellDef>Ver Formulario</th>
      <td mat-cell *matCellDef="let form">
        <button mat-icon-button color="primary" (click)="navigateToViewForm(form.id)">
          <mat-icon>visibility</mat-icon>
        </button>
      </td>
    </ng-container>

    <!-- Toggle Column -->
    <ng-container matColumnDef="toggle">
      <th mat-header-cell *matHeaderCellDef>Asignar formulario</th>
      <td mat-cell *matCellDef="let form">
        <mat-slide-toggle [(ngModel)]="form.isAssigned" (change)="toggleFormAssignment(form)">
        </mat-slide-toggle>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="['id', 'creationDate', 'conferenceUsed', 'questionCount', 'viewForm', 'toggle']"></tr>
    <tr mat-row *matRowDef="let row; columns: ['id', 'creationDate', 'conferenceUsed', 'questionCount', 'viewForm', 'toggle']"></tr>
  </table>
</div>
