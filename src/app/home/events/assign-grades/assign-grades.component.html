<h1 style="display: flex; text-align: center; flex-direction: column; margin-left: 20px; margin-right: 20px;">
  Notas de {{eventName}}
</h1>
<div class="save-grades-container">
  <button class="save-button" (click)="updateAllGrades()" [disabled]="isSavingGrades">
    <mat-icon>save</mat-icon> Guardar notas
  </button>
</div>
<div class="table_component mat-elevation-z8" role="region" tabindex="0">
  <table mat-table [dataSource]="dataSource" matSort class="mat-table" multiTemplateDataRows>

    <!-- Nombre del estudiante -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
      <td mat-cell *matCellDef="let user">{{ user.fullName }}</td>
    </ng-container>

    <!-- Email -->
    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Correo electrónico</th>
      <td mat-cell *matCellDef="let user">{{ user.email }}</td>
    </ng-container>

    <!-- Campo de la nota -->
    <ng-container matColumnDef="grade" *ngIf="eventID">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Nota</th>
      <td mat-cell *matCellDef="let user">
        {{ user.myEvents['eventID']?.grade }}
        @if(hasEventID){
        <input type="number" min="0" max="100" step="0.1" placeholder="Sin nota"
          [value]="user.myEvents?.[eventID]?.grade ?? ''" [(ngModel)]="gradesMap[user.uid]"
          (input)="validateGradeInput(user.uid, $event)" (keydown)="preventInvalidKeys($event, gradesMap[user.uid])"
          (change)="updateSingleGrade(user.uid, extractInputValue($event))">
        }
      </td>
    </ng-container>

    <!-- Header y Rows -->
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>
</div>
