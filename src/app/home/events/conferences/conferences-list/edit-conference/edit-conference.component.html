<div class="edit-conference-form">
  <h1>Editar Conferencia</h1>
  <form [formGroup]="form" (ngSubmit)="submitForm()">
    <div class="form-group">
      <label for="title">Título</label>
      <input id="title" formControlName="title" type="text" placeholder="Ingrese el título" required>
    </div>

    <div class="form-group">
      <label for="description">Descripción</label>
      <textarea id="description" formControlName="description" placeholder="Ingrese la descripción" required></textarea>
    </div>

    <div class="form-group">
      <label for="startDate">Fecha de Inicio</label>
      <input id="startDate" formControlName="startDate" type="date" required>
    </div>

    <div class="form-group">
      <label for="finishDate">Fecha de Fin</label>
      <input id="finishDate" formControlName="finishDate" type="date" required>
    </div>

    <div class="form-group">
      <label for="startTime">Hora de Inicio</label>
      <input id="startTime" formControlName="startTime" type="time" required>
    </div>

    <div class="form-group">
      <label for="finishTime">Hora de Fin</label>
      <input id="finishTime" formControlName="finishTime" type="time" required>
    </div>

    <div class="form-group">
      <label for="place">Lugar</label>
      <input id="place" formControlName="place" type="text" placeholder="Ingrese el lugar" required>
    </div>

    <div class="form-group">
      <label for="placeLink">Enlace</label>
      <input id="placeLink" formControlName="placeLink" type="url" placeholder="Ingrese el enlace" required>
    </div>

    <button type="submit" [disabled]="form.invalid">Actualizar Conferencia</button>
  </form>
</div>

<app-modal *ngIf="isUpdatingModalOpened" 
         (closeModal)="closeUpdatingModal()"
         [showSubmitBtn]="false" 
         [isSubmittingChanges]="isSubmittingConference">
<ng-container modal-header>
  <div class="modal-header-text">
    Actualizando Conferencia
  </div>
</ng-container>
<ng-container modal-body>
  <div class="confirmation-body">
    <div class="loading-container">
      <mat-spinner diameter="40" color="primary"></mat-spinner>
      <p style="margin-top: 15px; text-align: center; color: #007bff;">
        Actualizando conferencia, por favor espera...
      </p>
    </div>
  </div>
</ng-container>
<ng-container modal-footer>
  <div class="confirmation-footer">
    <small style="color: #007bff;">Procesando...</small>
  </div>
</ng-container>
</app-modal>
